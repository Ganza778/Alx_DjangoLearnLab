<!-- LibraryProject/bookshelf/templates/bookshelf/book_list.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book List</title>
</head>
<body>
    <h1>Books</h1>

    {% if books %}
        <ul>
            {% for book in books %}
                <li>{{ book.title|escape }} by {{ book.author|escape }}</li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No books available.</p>
    {% endif %}

    <a href="{% url 'book_create' %}">Add a new book</a>
</body>
</html>
